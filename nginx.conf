server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — fall back to index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry-point so the browser always fetches the latest manifest
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Flutter fingerprints all asset URLs — safe to cache for a long time
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /assets/assets/config/global_config.json {
      add_header Cache-Control "no-cache";
  }
}
