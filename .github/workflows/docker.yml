name: build and push image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PROJECT_PATH: commet

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/.ghcup /usr/local/julia* \
            /usr/local/share/chromium /opt/microsoft /opt/google /opt/az \
            /opt/hostedtoolcache
          docker system prune -af || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.8.0
        with:
          flutter-version: '3.41.1'
          channel: 'stable'
          cache: true

      - name: Setup Rust (needed for vodozemac WASM)
        uses: moonrepo/setup-rust@v1
        with:
          cache: true

      - name: Add Rust nightly src component
        run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Cache flutter_rust_bridge_codegen binary
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/flutter_rust_bridge_codegen
          key: frb-codegen-${{ runner.os }}

      - name: Install flutter_rust_bridge_codegen
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen

      - name: Prepare web (build vodozemac WASM)
        run: ./scripts/prepare-web.sh
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Code generation
        run: dart run scripts/codegen.dart
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Build web
        run: |
          flutter build web \
            --dart-define BUILD_MODE=release \
            --dart-define PLATFORM=web \
            --dart-define GIT_HASH=${{ github.sha }} \
            --dart-define VERSION_TAG=main \
            --dart-define BUILD_DATE=${{ github.run_id }}
        working-directory: ${{ env.PROJECT_PATH }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
