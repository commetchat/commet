<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>$RUNNER_PAGE_TITLE</title>
</head>

<body style="margin: 0px; overflow: hidden;">
    <iframe id="widget-frame" allow="fullscreen" style="width: 100vw; height: 100dvh; border: none; overflow: hidden;"
        src="$IFRAME_URL"></iframe>
    <script>

//${WIDGETS_COMMON}

        const childWindow = document.getElementById('widget-frame').contentWindow;

        let target = `$IFRAME_URL`;

        let targetUrl = new URL(target);

        const delay = ms => new Promise(res => setTimeout(res, ms));
        
        console.log(targetUrl);
        console.log("Target: ", target);

        var __internal_commet_widget_runner_msgCount = 0;

        function sendIpc(msg) {
            __internal_commet_widget_runner_msgCount += 1;
            var key = "chat.commet.fromWidget:" + __internal_commet_widget_runner_msgCount.toString();
        
            // add '_' because somewhere it was getting auto-converted to json object
            sessionStorage.setItem(key, "_" + msg);
            window.flutter_inappwebview.callHandler("widget_handler", key)
        }

        window.addEventListener("message", (message) => {

            if (message.source !== childWindow) {
                return; // Skip message in this event listener
            }

            let converted = encodeArrayBuffers(message.data);
            console.log("Received message: ", converted);

            sendIpc(JSON.stringify(converted))
        })


        window.onMessagePolyfill = (message) => {
        
            var data = JSON.parse(message)

            decodeArrayBuffers(data).then((value) => {
                console.log("Received response: ", value)
                console.log("Sending to: ", targetUrl.origin);
                childWindow.postMessage(value, targetUrl.origin);
            });
        }

    </script>
</body>
</html>
